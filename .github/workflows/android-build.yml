name: Android Build and Release

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create .env file for Android build
        run: |
          cat > android/.env << EOF
          API_BASE_URL=${{ secrets.API_BASE_URL || 'https://api.madhavai.com/api' }}
          API_TIMEOUT=${{ secrets.API_TIMEOUT || '30000' }}
          ENABLE_API=${{ secrets.ENABLE_API || 'true' }}
          ENABLE_LOGGING=${{ secrets.ENABLE_LOGGING || 'false' }}
          STORAGE_LIMIT_MB=${{ secrets.STORAGE_LIMIT_MB || '500' }}
          SYNC_INTERVAL_MS=${{ secrets.SYNC_INTERVAL_MS || '360000' }}
          MAX_RETRY_ATTEMPTS=${{ secrets.MAX_RETRY_ATTEMPTS || '5' }}
          OTA_API_BASE_URL=${{ secrets.OTA_API_BASE_URL || 'https://api.madhavai.app' }}
          EOF
          echo "✅ Created android/.env file"

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "✅ Keystore decoded successfully"
          else
            echo "⚠️  No keystore secret set, using debug signing"
          fi

      - name: Build debug APK (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build release AAB
        if: github.event_name != 'pull_request'
        env:
          MADHAVAI_UPLOAD_STORE_FILE: release.keystore
          MADHAVAI_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MADHAVAI_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MADHAVAI_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease
          mkdir -p ../build-artifacts
          cp app/build/outputs/bundle/release/app-release.aab ../build-artifacts/

      - name: Build release APK
        if: github.event_name != 'pull_request'
        env:
          MADHAVAI_UPLOAD_STORE_FILE: release.keystore
          MADHAVAI_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MADHAVAI_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MADHAVAI_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew clean assembleRelease
          mkdir -p app/build/outputs/bundle/release
          cp ../build-artifacts/app-release.aab app/build/outputs/bundle/release/

      - name: Upload debug APK artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload release artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Check build sizes
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          echo "📊 Build sizes:"
          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            AAB_SIZE=$(stat -c%s android/app/build/outputs/bundle/release/app-release.aab)
            echo "AAB: $((AAB_SIZE / 1024 / 1024)) MB"
          fi
          if [ -d "android/app/build/outputs/apk/release" ]; then
            ls -lh android/app/build/outputs/apk/release/*.apk
          fi

  github-release:
    name: Create GitHub Release
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: release-artifacts

      - name: Generate release tag
        id: tag
        run: |
          # Use short SHA + timestamp for a unique release tag per push
          TAG="build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          files: |
            release-artifacts/bundle/release/app-release.aab
            release-artifacts/apk/release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
