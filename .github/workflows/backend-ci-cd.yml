name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/**'
      - '.github/workflows/backend-ci-cd.yml'

env:
  NODE_VERSION: '22.11.0'
  AWS_REGION: ap-south-1

jobs:
  check-backend-exists:
    name: Check Backend Code
    runs-on: ubuntu-latest
    outputs:
      has_backend: ${{ steps.check.outputs.has_backend }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for backend directories
        id: check
        run: |
          if [ -d "infrastructure/terraform" ] || [ -d "backend" ] || [ -d "lambda" ]; then
            echo "has_backend=true" >> $GITHUB_OUTPUT
            echo "✅ Backend code found"
          else
            echo "has_backend=false" >> $GITHUB_OUTPUT
            echo "⚠️  No backend infrastructure code found. Skipping backend CI/CD."
            echo "This is a mobile-only repository. Backend deployment is not applicable."
          fi

  build-and-test:
    name: Build and Test
    needs: check-backend-exists
    if: needs.check-backend-exists.outputs.has_backend == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run unit tests
        run: npm test -- --coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
      
      - name: Build Lambda functions
        run: |
          mkdir -p dist/lambda
          npm run build:lambda
      
      - name: Validate Lambda builds
        run: |
          echo "Checking Lambda function builds..."
          REQUIRED_LAMBDAS=("auth" "recommendations" "schemes" "market-prices" "alerts" "training")
          
          for lambda in "${REQUIRED_LAMBDAS[@]}"; do
            if [ -f "dist/lambda/${lambda}.zip" ]; then
              SIZE=$(stat -c%s "dist/lambda/${lambda}.zip" 2>/dev/null || stat -f%z "dist/lambda/${lambda}.zip")
              SIZE_MB=$((SIZE / 1024 / 1024))
              echo "✅ ${lambda}.zip - ${SIZE_MB} MB"
            else
              echo "❌ ${lambda}.zip not found!"
              exit 1
            fi
          done
          
          echo "All Lambda functions built successfully!"
      
      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-functions
          path: dist/lambda/*.zip
          retention-days: 7

  security-scan:
    name: Security Scan
    needs: check-backend-exists
    if: needs.check-backend-exists.outputs.has_backend == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run dependency vulnerability scan
        run: npm audit --audit-level=high
        continue-on-error: true
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy-staging:
    name: Deploy to Staging
    needs: [check-backend-exists, build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && needs.check-backend-exists.outputs.has_backend == 'true'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-functions
          path: dist/lambda
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Setup Terraform Backend (S3 + DynamoDB)
        run: |
          echo "Setting up Terraform backend..."
          
          BUCKET_NAME="farmer-platform-terraform-state"
          TABLE_NAME="terraform-state-lock"
          REGION="${{ env.AWS_REGION }}"
          
          # Create S3 bucket if it doesn't exist
          if ! aws s3 ls "s3://$BUCKET_NAME" 2>/dev/null; then
            echo "Creating S3 bucket: $BUCKET_NAME"
            aws s3 mb "s3://$BUCKET_NAME" --region "$REGION"
            
            # Enable versioning
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled
            
            # Enable encryption
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }]
              }'
            
            # Block public access
            aws s3api put-public-access-block \
              --bucket "$BUCKET_NAME" \
              --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            
            echo "✅ S3 bucket created and configured"
          else
            echo "✅ S3 bucket already exists"
          fi
          
          # Create DynamoDB table if it doesn't exist
          if ! aws dynamodb describe-table --table-name "$TABLE_NAME" --region "$REGION" 2>/dev/null; then
            echo "Creating DynamoDB table: $TABLE_NAME"
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
            
            # Wait for table to be active
            aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$REGION"
            echo "✅ DynamoDB table created"
          else
            echo "✅ DynamoDB table already exists"
          fi
          
          echo "✅ Terraform backend setup complete"
      
      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init
      
      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var="environment=staging" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -out=tfplan
      
      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan
      
      - name: Get API Gateway URL
        id: api_url
        working-directory: infrastructure/terraform
        run: |
          API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "")
          if [ -n "$API_URL" ]; then
            echo "api_url=$API_URL" >> $GITHUB_OUTPUT
            echo "✅ API Gateway URL: $API_URL"
          else
            echo "⚠️  API Gateway URL not available yet"
          fi
      
      - name: Verify DynamoDB Tables
        run: |
          echo "Verifying DynamoDB tables..."
          
          # Check users table
          aws dynamodb describe-table \
            --table-name farmer-platform-users-staging \
            --region ${{ env.AWS_REGION }} \
            --query 'Table.[TableName,TableStatus,GlobalSecondaryIndexes[*].IndexName]' \
            --output text || echo "⚠️  Users table not found"
          
          echo "✅ DynamoDB verification complete"
      
      - name: Run E2E tests
        if: steps.api_url.outputs.api_url != ''
        run: npm run test:e2e
        continue-on-error: true
        env:
          API_URL: ${{ steps.api_url.outputs.api_url }}

  deploy-production:
    name: Deploy to Production
    needs: [check-backend-exists, build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.check-backend-exists.outputs.has_backend == 'true'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-functions
          path: dist/lambda
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Setup Terraform Backend (S3 + DynamoDB)
        run: |
          echo "Setting up Terraform backend..."
          
          BUCKET_NAME="farmer-platform-terraform-state"
          TABLE_NAME="terraform-state-lock"
          REGION="${{ env.AWS_REGION }}"
          
          # Check if S3 bucket exists (should already exist from staging)
          if ! aws s3 ls "s3://$BUCKET_NAME" 2>/dev/null; then
            echo "Creating S3 bucket: $BUCKET_NAME"
            aws s3 mb "s3://$BUCKET_NAME" --region "$REGION"
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET_NAME" --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            echo "✅ S3 bucket created"
          else
            echo "✅ S3 bucket already exists"
          fi
          
          # Check if DynamoDB table exists
          if ! aws dynamodb describe-table --table-name "$TABLE_NAME" --region "$REGION" 2>/dev/null; then
            echo "Creating DynamoDB table: $TABLE_NAME"
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
            aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$REGION"
            echo "✅ DynamoDB table created"
          else
            echo "✅ DynamoDB table already exists"
          fi
          
          echo "✅ Terraform backend ready"
      
      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init
      
      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var="environment=production" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -out=tfplan
      
      - name: Blue-Green Deployment - Create new version
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan
      
      - name: Get API Gateway URL
        id: api_url
        working-directory: infrastructure/terraform
        run: |
          API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "")
          if [ -n "$API_URL" ]; then
            echo "api_url=$API_URL" >> $GITHUB_OUTPUT
            echo "✅ API Gateway URL: $API_URL"
          else
            echo "⚠️  API Gateway URL not available yet"
          fi
      
      - name: Verify DynamoDB Tables
        run: |
          echo "Verifying DynamoDB tables..."
          
          # Check users table
          aws dynamodb describe-table \
            --table-name farmer-platform-users-production \
            --region ${{ env.AWS_REGION }} \
            --query 'Table.[TableName,TableStatus,GlobalSecondaryIndexes[*].IndexName]' \
            --output text || echo "⚠️  Users table not found"
          
          echo "✅ DynamoDB verification complete"
      
      - name: Check if Lambda alias exists
        id: check_alias
        run: |
          if aws lambda get-alias \
            --function-name farmer-platform-auth-production \
            --name live \
            --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "alias_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Lambda alias 'live' exists"
          else
            echo "alias_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  Lambda alias 'live' does not exist (first deployment)"
          fi
      
      - name: Create Lambda alias (first deployment)
        if: steps.check_alias.outputs.alias_exists == 'false'
        run: |
          echo "Creating 'live' alias for first deployment..."
          
          FUNCTIONS=("auth" "recommendations" "schemes" "market-prices" "alerts" "training")
          
          for func in "${FUNCTIONS[@]}"; do
            FUNCTION_NAME="farmer-platform-${func}-production"
            
            # Get latest version
            VERSION=$(aws lambda publish-version \
              --function-name "$FUNCTION_NAME" \
              --region ${{ env.AWS_REGION }} \
              --query 'Version' \
              --output text)
            
            # Create alias pointing to this version
            aws lambda create-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --function-version "$VERSION" \
              --region ${{ env.AWS_REGION }}
            
            echo "✅ Created alias 'live' for $FUNCTION_NAME -> version $VERSION"
          done
      
      - name: Canary Deployment - 10% traffic
        if: steps.check_alias.outputs.alias_exists == 'true'
        run: |
          echo "Starting canary deployment with 10% traffic..."
          
          FUNCTIONS=("auth" "recommendations" "schemes" "market-prices" "alerts" "training")
          
          for func in "${FUNCTIONS[@]}"; do
            FUNCTION_NAME="farmer-platform-${func}-production"
            
            # Publish new version
            NEW_VERSION=$(aws lambda publish-version \
              --function-name "$FUNCTION_NAME" \
              --region ${{ env.AWS_REGION }} \
              --query 'Version' \
              --output text)
            
            # Get current alias version
            CURRENT_VERSION=$(aws lambda get-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --region ${{ env.AWS_REGION }} \
              --query 'FunctionVersion' \
              --output text)
            
            # Skip if new version is the same as current (no code change)
            if [ "$NEW_VERSION" == "$CURRENT_VERSION" ]; then
              echo "⏭️  $FUNCTION_NAME: No change (already at v$CURRENT_VERSION), skipping canary"
              continue
            fi
            
            # Update alias with 10% traffic to new version
            aws lambda update-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --function-version "$CURRENT_VERSION" \
              --routing-config "{\"AdditionalVersionWeights\":{\"$NEW_VERSION\":0.1}}" \
              --region ${{ env.AWS_REGION }}
            
            echo "✅ $FUNCTION_NAME: 90% -> v$CURRENT_VERSION, 10% -> v$NEW_VERSION"
          done
      
      - name: Monitor canary metrics
        if: steps.check_alias.outputs.alias_exists == 'true'
        run: |
          echo "Monitoring canary deployment for 5 minutes..."
          sleep 300
          
          FUNCTIONS=("auth" "recommendations" "schemes" "market-prices" "alerts" "training")
          TOTAL_ERRORS=0
          
          for func in "${FUNCTIONS[@]}"; do
            FUNCTION_NAME="farmer-platform-${func}-production"
            
            ERROR_RATE=$(aws cloudwatch get-metric-statistics \
              --namespace AWS/Lambda \
              --metric-name Errors \
              --dimensions Name=FunctionName,Value="$FUNCTION_NAME" \
              --start-time $(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%S) \
              --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
              --period 300 \
              --statistics Sum \
              --region ${{ env.AWS_REGION }} \
              --query 'Datapoints[0].Sum' \
              --output text)
            
            if [ "$ERROR_RATE" != "None" ]; then
              TOTAL_ERRORS=$((TOTAL_ERRORS + ERROR_RATE))
              echo "⚠️  $FUNCTION_NAME: $ERROR_RATE errors"
            else
              echo "✅ $FUNCTION_NAME: 0 errors"
            fi
          done
          
          if [ "$TOTAL_ERRORS" -gt 10 ]; then
            echo "❌ Error rate too high ($TOTAL_ERRORS errors), rolling back"
            exit 1
          fi
          
          echo "✅ Canary metrics look good (total errors: $TOTAL_ERRORS)"
      
      - name: Gradual traffic shift - 50%
        if: steps.check_alias.outputs.alias_exists == 'true'
        run: |
          echo "Shifting to 50% traffic..."
          
          FUNCTIONS=("auth" "recommendations" "schemes" "market-prices" "alerts" "training")
          
          for func in "${FUNCTIONS[@]}"; do
            FUNCTION_NAME="farmer-platform-${func}-production"
            
            # Get new version from existing routing config (set during canary step)
            NEW_VERSION=$(aws lambda get-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --region ${{ env.AWS_REGION }} \
              --query 'RoutingConfig.AdditionalVersionWeights' \
              --output json | jq -r 'keys[0] // empty')
            
            CURRENT_VERSION=$(aws lambda get-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --region ${{ env.AWS_REGION }} \
              --query 'FunctionVersion' \
              --output text)
            
            # Skip if no canary was set (no code change)
            if [ -z "$NEW_VERSION" ] || [ "$NEW_VERSION" == "$CURRENT_VERSION" ]; then
              echo "⏭️  $FUNCTION_NAME: No canary in progress, skipping"
              continue
            fi
            
            # Update to 50% traffic
            aws lambda update-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --function-version "$CURRENT_VERSION" \
              --routing-config "{\"AdditionalVersionWeights\":{\"$NEW_VERSION\":0.5}}" \
              --region ${{ env.AWS_REGION }}
            
            echo "✅ $FUNCTION_NAME: 50% -> v$CURRENT_VERSION, 50% -> v$NEW_VERSION"
          done
      
      - name: Monitor 50% traffic
        if: steps.check_alias.outputs.alias_exists == 'true'
        run: |
          echo "Monitoring 50% traffic for 5 minutes..."
          sleep 300
          echo "✅ 50% traffic monitoring complete"
      
      - name: Complete deployment - 100% traffic
        if: steps.check_alias.outputs.alias_exists == 'true'
        run: |
          echo "Completing deployment with 100% traffic to new version..."
          
          FUNCTIONS=("auth" "recommendations" "schemes" "market-prices" "alerts" "training")
          
          for func in "${FUNCTIONS[@]}"; do
            FUNCTION_NAME="farmer-platform-${func}-production"
            
            # Get the new version from routing config
            ALIAS_INFO=$(aws lambda get-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --region ${{ env.AWS_REGION }})
            
            # Extract new version from AdditionalVersionWeights
            NEW_VERSION=$(echo "$ALIAS_INFO" | jq -r '.RoutingConfig.AdditionalVersionWeights | keys[0]')
            
            # If no routing config, get current version (already at 100%)
            if [ "$NEW_VERSION" == "null" ] || [ -z "$NEW_VERSION" ]; then
              echo "⚠️  $FUNCTION_NAME: Already at 100%, skipping"
              continue
            fi
            
            # Update alias to new version with empty routing config (100% traffic)
            echo '{}' > /tmp/empty-routing-config.json
            
            aws lambda update-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --function-version "$NEW_VERSION" \
              --routing-config file:///tmp/empty-routing-config.json \
              --region ${{ env.AWS_REGION }}
            
            echo "✅ $FUNCTION_NAME: 100% -> v$NEW_VERSION"
          done
          
          echo "✅ Deployment complete!"
      
      - name: Rollback on failure
        if: failure() && steps.check_alias.outputs.alias_exists == 'true'
        run: |
          echo "❌ Deployment failed, rolling back to previous version..."
          
          FUNCTIONS=("auth" "recommendations" "schemes" "market-prices" "alerts" "training")
          
          for func in "${FUNCTIONS[@]}"; do
            FUNCTION_NAME="farmer-platform-${func}-production"
            
            # Get current alias configuration
            CURRENT_VERSION=$(aws lambda get-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --region ${{ env.AWS_REGION }} \
              --query 'FunctionVersion' \
              --output text)
            
            # Remove routing config (100% to current version)
            aws lambda update-alias \
              --function-name "$FUNCTION_NAME" \
              --name live \
              --function-version "$CURRENT_VERSION" \
              --region ${{ env.AWS_REGION }} || echo "⚠️  Could not rollback $FUNCTION_NAME"
            
            echo "✅ Rolled back $FUNCTION_NAME to version $CURRENT_VERSION"
          done
          
          echo "✅ Rollback complete"
      
      # Slack notification removed - add SLACK_WEBHOOK_URL secret to enable
